add_newline = false
command_timeout = 1000

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 4
truncate_to_repo = true

[git_branch]
symbol = "git:"
style = "bold purple"

[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "
