# 示例衙门 (yamen) — 通用全栈项目模板。
# 拷一份当你自己的 yamen 用：
#   cp -r ~/Desktop/agent-yamen/projects/example ~/.agent-yamen/projects/<your-yamen>
# 然后改 work_dir 和各 role 的 prompt。

project: example
session: yamen-example
attach_window: zongguan

# 各 role 默认调用的 LLM CLI。
# 任何接受 --append-system-prompt 和 --model 的 CLI 都能用 (claude, codex 等)。
default_cli: claude

roles:
  - name: zongguan
    role: 总管 — 接上游派活，拆分给各主事 (project dispatcher)
    prompt: zongguan.md
    work_dir: /path/to/your/project
    model: ""

  - name: frontend
    role: 主事 (UI engineer) — React / Vue / Svelte 等
    prompt: frontend.md
    work_dir: /path/to/your/project/web
    model: ""

  - name: backend
    role: 主事 (server engineer) — API / DB / auth
    prompt: backend.md
    work_dir: /path/to/your/project/server
    model: ""

  - name: devops
    role: 主事 (infra/deploy/CI engineer)
    prompt: devops.md
    work_dir: /path/to/your/project/infra
    model: ""

# 不跑 LLM 的辅助 tmux 窗口 (只执行 shell 命令)。
utility_windows:
  - name: bus
    cmd: "tail -f ~/.agent-yamen/projects/example/shared/event.log"
  - name: shell
    cmd: "cd /path/to/your/project && exec $SHELL"

# ---------------------------------------------------------------------------
# 邦交 (bangjiao / federation) —— 衙门间网络。默认关闭。
#
# 不需要邦交就把这整块注释着 (或 enabled: false)。
# tongzheng (court-peer) 在 bangjiao 关闭时拒绝启动。
#
# 启用前还要：
#   1. zhuyin <project>     生成本衙门的密钥对 (印信)
#   2. 编辑 bangjiao.yaml   填入对方的密钥指纹和地址
#   3. tongzheng <project>  起接收端守护进程
# ---------------------------------------------------------------------------
# bangjiao:
#   enabled: true
#
#   # 本衙门在邦交网络上的 yamen_id。默认 "<hostname>-<project>"。
#   # 取一个稳定的名字；对方 bangjiao.yaml 用这个字符串引用你。
#   yamen_id: "alice-laptop-example"
#
#   # 哪些 role 允许外邦派活。不在名单的一律 403。
#   # 不写这一项时默认 ["zongguan"] —— 只有总管能被外邦打到，
#   # 总管自己再分派给各主事。显式空列表会彻底封死。
#   expose_roles:
#     - zongguan
#
#   # PR-2 —— 律例引擎用这两个清单检查入站消息的 attaches:。
#   # allow_paths 非空但 attach 没匹配上 → human_required (留中)。
#   # 命中 deny_paths (或硬编码 deny) → denied (退档)。
#   allow_paths:
#     - "bus/zongguan/inbox/**"
#     - "shared/notes-public.md"
#   deny_paths:
#     - "prompts/**"
#     - "shared/notes-private.md"
#
#   # PR-3 —— 推官 (LLM judge) 的配置。tier_b 的消息会交推官裁决，
#   # 推官输出 auto_pass / human_required 二选一。
#   tuiguan:
#     # 调哪个 CLI。不填时用顶层 default_cli。
#     # cli: claude
#     # 透传给 CLI 的 --model。
#     # model: haiku
#     # 覆盖内建提示词 (默认是 mcp/yamen-mcp/prompts/tuiguan.md)
#     # prompt_file: /path/to/custom/tuiguan.md
#     # 硬超时；超过则回落到 human_required。
#     timeout_seconds: 30
#     # auto_pass 判定置信度低于这个阈值会被升级为 human_required。
#     confidence_threshold: 0.6
